<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETRAN</title>
</head>
<body>
    <h1>Sistema de multas</h1>
    Velocidade do carro: <input type="number" name="txtvel" id="txtvel">
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="res">

    </div>
    <script>
        function calcular() {
            // 1. Seleção de elementos
            const txtv = document.querySelector('input#txtvel')
            const res = document.querySelector('div#res')

            // 2. Obter e tratar dados
            const vel = Number(txtv.value)

             // 3. Processamento (lógica)
            res.innerHTML = `<p>Sua velocidade atual é de ${vel}KM/h</p>`
            if (vel > 60) {
                res.innerHTML += '<p>Você foi multado por excesso de velocidade!</p>'
            }
            // 4. Saída (interface)
            res.innerHTML += '<p>Dirija sempre com o cinto de segurança!</p>'
        }
    </script>
</body>
</html>
