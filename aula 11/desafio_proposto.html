<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nacionalidade</title>
</head>
<body>

    <h1>Sistema de Nacionalidade</h1>

    País onde você mora: 
    <input type="text" id="txtpais">

    <input type="button" value="Verificar" onclick="verificar()">

    <div id="res"></div>

    <script>
        function verificar() {

            // 1. Seleção de elementos
            const txtp = document.querySelector('#txtpais')
            const res = document.querySelector('#res')

            // 2. Obter e tratar dados
            const pais = txtp.value

            // 3. Saída inicial
            res.innerHTML = `<p>Vivendo em ${pais}</p>`

            // 4. Processamento (lógica)
            if (pais == 'Brasil') {
                res.innerHTML += `<p>Você é brasileiro</p>`
            } else {
                res.innerHTML += `<p>Você é estrangeiro</p>`
            }

        }
    </script>

</body>
</html>
