<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de DOM</title>
    <style>

        body {
            display: flex;
            flex-direction: column;
        }

        .topo {
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: row;
            padding-left: 40px;
        }

        .container div {
            margin-right: 20px;
        }

        div#area01 {
            font: normal 35px arial;
            background-color: rgb(42, 102, 42);
            color: white;
            width: 300px;
            height: 300px;
            border-radius: 20px;
            line-height: 300px;
            text-align: center;

        }

        div#area02 {
            font: normal 35px arial;
            background-color: rgb(182, 47, 42);
            color: white;
            width: 300px;
            height: 300px;
            border-radius: 20px;
            line-height: 300px;
            text-align: center;
        }

        div#area03 {
            font: normal 35px arial;
            background-color: rgb(185, 185, 77);
            color: white;
            width: 300px;
            height: 300px;
            border-radius: 20px;
            line-height: 300px;
            text-align: center;
        }

    </style>
</head>
<body>
    <div class="topo">
        <h1>Práticas em DOM</h1>
        <h2>Seleção de elementos e Eventos em DOM</h2>
    </div>

    <div class="container">
        <div id="area01">AREA 01</div>
        <div id="area02">AREA 02</div>
        <div id="area03">AREA 03</div>
    </div>

    <script>

        var a1 = window.document.getElementById('area01')
        
        a1.addEventListener('click', clicar)
        a1.addEventListener('mouseenter', entrar)
        a1.addEventListener('mouseout', sair)

        function clicar() {
            a1.innerText = 'clicou'
        }
        function entrar() {
            a1.innerText = 'Desencosta fazendo favor sô'
        }
        function sair() {
            a1.innerText = 'Eu hein'
        }

    </script>

</body>
</html>
