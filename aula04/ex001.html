<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro Programa</title>
    <style>
        body {
            background-color: lightblue;
            color: white;
            font: normal 20pt arial;
        }
    </style>
</head>
<body>

    <p>Me livrei da maldição!</p>

    </script>

</html>
